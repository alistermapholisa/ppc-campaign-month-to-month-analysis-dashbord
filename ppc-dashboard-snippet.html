<!-- 
  PPC Dashboard - Isolated Component
  This version uses Shadow DOM and scoped CSS to prevent conflicts with your website
  Safe to embed anywhere without affecting existing styles or scripts
-->

<div id="ppc-dashboard-root"></div>

<script>
(function() {
  'use strict';

  // Create Shadow DOM container
  const root = document.getElementById('ppc-dashboard-root');
  const shadow = root.attachShadow({ mode: 'open' });

  // Inject Chart.js library
  const chartScript = document.createElement('script');
  chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
  document.head.appendChild(chartScript);

  // Wait for Chart.js to load
  chartScript.onload = function() {
    initDashboard();
  };

  // Dashboard initialization

    // Create HTML structure

          .ppc-charts-grid {

      </style>

      <div class="ppc-dashboard-wrapper">
        <div class="ppc-header">
          <h1>📊 PPC Campaign Dashboard</h1>

        <div class="ppc-section">
          <h2 class="ppc-section-title">📊 Month-to-Month Comparison & Trends</h2>
          <div class="ppc-charts-grid">
            <div class="ppc-chart-container">
              <canvas id="ppc-leads-trend"></canvas>

            <div class="ppc-chart-container">

            <div class="ppc-chart-container">

            </div>
            <div class="ppc-chart-container">

        </div>

        <div class="ppc-section">
          <h2 class="ppc-section-title">🎯 Platform Performance Comparison</h2>
          <table class="ppc-table">
            <thead>
              <tr>
                <th>Platform</th>
                <th>Spend (ZAR)</th>
                <th>Leads</th>
                <th>CPL (ZAR)</th>
                <th>Impressions</th>
                <th>Clicks</th>

                <th>CPC (ZAR)</th>
              </tr>
            </thead>
            <tbody id="ppc-platform-table"></tbody>
          </table>
        </div>

        <div class="ppc-section">
          <h2 class="ppc-section-title">💡 Key Insights & Recommendations</h2>
          <div id="ppc-insights"></div>
        </div>
      </div>
    `;

    // Inject HTML into shadow DOM
    shadow.innerHTML = html;

    // Embedded Dashboard Data
    const dashboardData = {

          "month": "February 2026",

    };

    let charts = {};

    // Render Dashboard
    function renderDashboard() {
      const currentMonth = dashboardData.campaigns[0];
      const previousMonth = dashboardData.campaigns[1] || null;

      renderMetrics(currentMonth, previousMonth);
      renderCharts(currentMonth);
      renderTrendCharts(dashboardData.campaigns);
      renderPlatformTable(currentMonth);
      renderInsights(currentMonth, previousMonth);
    }

    // Render Metrics
    function renderMetrics(current, previous) {
      const metrics = [
        {
          label: 'Total Leads',
          value: current.totalLeads,
          previous: previous ? previous.totalLeads : null,
          format: 'number'
        },
        {
          label: 'Total Spend',
          value: current.totalSpend,
          previous: previous ? previous.totalSpend : null,
          format: 'currency'
        },
        {
          label: 'Cost Per Lead',
          value: current.totalSpend / current.totalLeads,
          previous: previous ? previous.totalSpend / previous.totalLeads : null,
          format: 'currency'
        },
        {
          label: 'Total Followers',
          value: current.totalFollowers,
          previous: previous ? previous.totalFollowers : null,
          format: 'number'
        }
      ];

      const grid = shadow.getElementById('ppc-metrics-grid');
      grid.innerHTML = metrics.map(metric => {
        const change = metric.previous ? ((metric.value - metric.previous) / metric.previous * 100) : 0;
        const changeClass = change > 0 ? 'positive' : change < 0 ? 'negative' : '';
        const changeSymbol = change > 0 ? '↑' : change < 0 ? '↓' : '→';
        const formattedValue = metric.format === 'currency' ? `ZAR ${metric.value.toFixed(2)}` : metric.value.toFixed(0);
        const changeText = metric.previous ? `${changeSymbol} ${Math.abs(change).toFixed(1)}%` : 'No previous data';

        return `
          <div class="ppc-metric-card">
            <div class="ppc-metric-label">${metric.label}</div>
            <div class="ppc-metric-value">${formattedValue}</div>
            <div class="ppc-metric-change ${changeClass}">${changeText}</div>
          </div>
        `;
      }).join('');
    }

    // Render Charts
    function renderCharts(current) {
      // Spend Distribution
      const spendCtx = shadow.getElementById('ppc-spend-chart').getContext('2d');
      if (charts.spend) charts.spend.destroy();
      charts.spend = new Chart(spendCtx, {
        type: 'doughnut',
        data: {
          labels: current.platforms.map(p => p.name),
          datasets: [{
            data: current.platforms.map(p => p.spend),
            backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'],
            borderColor: '#ffffff',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' },
            title: { display: true, text: 'Spend Distribution by Platform' }
          }
        }
      });

      // CPC Comparison
      const cpcCtx = shadow.getElementById('ppc-cpc-chart').getContext('2d');
      if (charts.cpc) charts.cpc.destroy();
      charts.cpc = new Chart(cpcCtx, {
        type: 'bar',
        data: {
          labels: current.platforms.map(p => p.name),
          datasets: [{
            label: 'Cost Per Click (ZAR)',
            data: current.platforms.map(p => p.cpc || 0),
            backgroundColor: '#3b82f6',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Cost Per Click by Platform' } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // CTR Comparison
      const ctrCtx = shadow.getElementById('ppc-ctr-chart').getContext('2d');
      if (charts.ctr) charts.ctr.destroy();
      charts.ctr = new Chart(ctrCtx, {
        type: 'bar',
        data: {
          labels: current.platforms.map(p => p.name),
          datasets: [{
            label: 'Click-Through Rate (%)',
            data: current.platforms.map(p => p.ctr || 0),
            backgroundColor: '#10b981',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Click-Through Rate by Platform' } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // Leads by Platform
      const leadsCtx = shadow.getElementById('ppc-leads-chart').getContext('2d');
      if (charts.leads) charts.leads.destroy();
      charts.leads = new Chart(leadsCtx, {
        type: 'bar',
        data: {
          labels: current.platforms.map(p => p.name),
          datasets: [{
            label: 'Leads Generated',
            data: current.platforms.map(p => p.leads || 0),
            backgroundColor: '#f59e0b',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Leads by Platform' } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    // Render Trend Charts
    function renderTrendCharts(campaigns) {
      const months = campaigns.slice(0, 6).map(c => c.month).reverse();
      const leads = campaigns.slice(0, 6).map(c => c.totalLeads).reverse();
      const spend = campaigns.slice(0, 6).map(c => c.totalSpend).reverse();
      const cpl = campaigns.slice(0, 6).map(c => c.totalSpend / c.totalLeads).reverse();
      const cpc = campaigns.slice(0, 6).map(c => {
        const totalClicks = c.platforms.reduce((sum, p) => sum + (p.clicks || 0), 0);
        return totalClicks > 0 ? c.totalSpend / totalClicks : 0;
      }).reverse();

      // Leads Trend
      const leadsTrendCtx = shadow.getElementById('ppc-leads-trend').getContext('2d');
      if (charts.leadsTrend) charts.leadsTrend.destroy();
      charts.leadsTrend = new Chart(leadsTrendCtx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Total Leads',
            data: leads,
            borderColor: '#10b981',
            backgroundColor: 'rgba(16, 185, 129, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 6,
            pointBackgroundColor: '#10b981'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Leads Trend' } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // Spend Trend
      const spendTrendCtx = shadow.getElementById('ppc-spend-trend').getContext('2d');
      if (charts.spendTrend) charts.spendTrend.destroy();
      charts.spendTrend = new Chart(spendTrendCtx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Total Spend (ZAR)',
            data: spend,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 6,
            pointBackgroundColor: '#3b82f6'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Spend Trend' } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // CPL Trend
      const cplTrendCtx = shadow.getElementById('ppc-cpl-trend').getContext('2d');
      if (charts.cplTrend) charts.cplTrend.destroy();
      charts.cplTrend = new Chart(cplTrendCtx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Cost Per Lead (ZAR)',
            data: cpl,
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239, 68, 68, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 6,
            pointBackgroundColor: '#ef4444'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Cost Per Lead Trend' } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // CPC Trend
      const cpcTrendCtx = shadow.getElementById('ppc-cpc-trend').getContext('2d');
      if (charts.cpcTrend) charts.cpcTrend.destroy();
      charts.cpcTrend = new Chart(cpcTrendCtx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Cost Per Click (ZAR)',
            data: cpc,
            borderColor: '#f59e0b',
            backgroundColor: 'rgba(245, 158, 11, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 6,
            pointBackgroundColor: '#f59e0b'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: 'Cost Per Click Trend' } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    // Render Platform Table
    function renderPlatformTable(current) {
      const tbody = shadow.getElementById('ppc-platform-table');
      tbody.innerHTML = current.platforms.map(platform => {
        const badge = platform.name.includes('Google') ? 'google' : 'facebook';
        return `
          <tr>
            <td><span class="ppc-platform-badge ${badge}">${platform.name}</span></td>
            <td>ZAR ${platform.spend.toFixed(2)}</td>
            <td>${platform.leads || 0}</td>
            <td>${platform.leads > 0 ? 'ZAR ' + (platform.spend / platform.leads).toFixed(2) : 'N/A'}</td>
            <td>${platform.impressions || 0}</td>
            <td>${platform.clicks || 0}</td>
            <td>${platform.ctr ? platform.ctr.toFixed(2) + '%' : 'N/A'}</td>
            <td>${platform.cpc ? 'ZAR ' + platform.cpc.toFixed(2) : 'N/A'}</td>
          </tr>
        `;
      }).join('');
    }

    // Render Insights
    function renderInsights(current, previous) {
      const insights = [];

      if (previous) {
        const leadChange = ((current.totalLeads - previous.totalLeads) / previous.totalLeads * 100);
        if (leadChange > 20) {
          insights.push({
            type: 'success',
            title: 'Strong Lead Growth',
            message: `Leads increased by ${leadChange.toFixed(1)}% - excellent performance!`
          });
        }
      }

      const bestPlatform = current.platforms.reduce((best, p) => {
        const bestCPL = best.leads > 0 ? best.spend / best.leads : Infinity;
        const currentCPL = p.leads > 0 ? p.spend / p.leads : Infinity;
        return currentCPL < bestCPL ? p : best;
      });

      if (bestPlatform.leads > 0) {
        insights.push({
          type: 'info',
          title: 'Best Performing Platform',
          message: `${bestPlatform.name} has the lowest CPL at ZAR ${(bestPlatform.spend / bestPlatform.leads).toFixed(2)}.`
        });
      }

      const insightsHtml = insights.map(insight => `
        <div class="ppc-comparison-box ${insight.type === 'warning' ? 'warning' : ''}">
          <div class="ppc-comparison-label">${insight.title}</div>
          <div class="ppc-comparison-value">${insight.message}</div>
        </div>
      `).join('');

      shadow.getElementById('ppc-insights').innerHTML = insightsHtml || '<p style="color: #6b7280;">Dashboard loaded successfully. Monitor metrics for insights.</p>';
    }

    // Initialize
    renderDashboard();
  }
})();
</script>
